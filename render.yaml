services:
  - type: web
    name: portfolio-site
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm run serve
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_ANALYTICS_ID
        value: G-YXDGTNWLHW
      - key: VITE_ANALYTICS_TYPE
        value: google
